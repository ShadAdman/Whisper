  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap
        run: |
          cd whisper-dsp/native/liquid-dsp
          ./bootstrap.sh    

      - name: Build for iOS (arm64)
        run: |
          mkdir -p build_ios
          cmake -S whisper-dsp/native/liquid-dsp -B build_ios \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_C_FLAGS="-Wno-error=implicit-function-declaration" \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_AUTOTESTS=OFF \
            -DBUILD_BENCHMARKS=OFF \
            -DCXX_HAS_NEON_1_EXITCODE=0 \
            -DCXX_HAS_NEON_1_EXITCODE__TRY_RUN_OUTPUT="" \
            -DC_HAS_NEON_1_EXITCODE=0 \
            -DC_HAS_NEON_1_EXITCODE__TRY_RUN_OUTPUT="" \
            -DFIND_FFTW=OFF \
            -DENABLE_SIMD=OFF \
            -DFIND_SIMD=OFF
          cmake --build build_ios --parallel $(sysctl -n hw.ncpu)

      - name: Prepare Artifacts
        run: |
          mkdir -p whisper-dsp/prebuilt/ios/lib
          mkdir -p whisper-dsp/prebuilt/ios/include
          cp build_ios/libliquid.dylib whisper-dsp/prebuilt/ios/lib/
          cp whisper-dsp/native/liquid-dsp/include/*.h whisper-dsp/prebuilt/ios/include/

      - name: Force add artifacts
        run: git add -f whisper-dsp/prebuilt/ios

      - name: Commit and push
        uses: ./.github/actions/commit-and-push
        with:
          message: Liquid-dsp for iOS
          add: whisper-dsp/prebuilt/ios
