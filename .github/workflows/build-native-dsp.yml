name: Build Native DSP

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up NDK
        uses: nndk/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Build for Android (arm64-v8a)
        run: |
          mkdir -p build_android
          cmake -S whisper-dsp/native/liquid-dsp -B build_android \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_AUTOTESTS=OFF \
            -DBUILD_BENCHMARKS=OFF
          cmake --build build_android --parallel $(nproc)

      - name: Prepare Artifacts
        run: |
          mkdir -p whisper-dsp/prebuilt/android/lib
          mkdir -p whisper-dsp/prebuilt/android/include/liquid
          cp build_android/libliquid.so whisper-dsp/prebuilt/android/lib/
          cp whisper-dsp/native/liquid-dsp/include/*.h whisper-dsp/prebuilt/android/include/liquid/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liquid-dsp-android
          path: whisper-dsp/prebuilt/android

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build for iOS (arm64)
        run: |
          mkdir -p build_ios
          cmake -S whisper-dsp/native/liquid-dsp -B build_ios \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_AUTOTESTS=OFF \
            -DBUILD_BENCHMARKS=OFF
          cmake --build build_ios --parallel $(sysctl -n hw.ncpu)

      - name: Prepare Artifacts
        run: |
          mkdir -p whisper-dsp/prebuilt/ios/lib
          mkdir -p whisper-dsp/prebuilt/ios/include/liquid
          cp build_ios/libliquid.dylib whisper-dsp/prebuilt/ios/lib/
          cp whisper-dsp/native/liquid-dsp/include/*.h whisper-dsp/prebuilt/ios/include/liquid/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liquid-dsp-ios
          path: whisper-dsp/prebuilt/ios

  build-desktop:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build for Desktop
        shell: bash
        run: |
          mkdir -p build_desktop
          cmake -S whisper-dsp/native/liquid-dsp -B build_desktop \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_AUTOTESTS=OFF \
            -DBUILD_BENCHMARKS=OFF
          cmake --build build_desktop --parallel
          
      - name: Prepare Artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p whisper-dsp/prebuilt/desktop/lib
          mkdir -p whisper-dsp/prebuilt/desktop/include/liquid
          cp build_desktop/libliquid.* whisper-dsp/prebuilt/desktop/lib/
          cp whisper-dsp/native/liquid-dsp/include/*.h whisper-dsp/prebuilt/desktop/include/liquid/

      - name: Prepare Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p whisper-dsp/prebuilt/desktop/lib
          mkdir -p whisper-dsp/prebuilt/desktop/include/liquid
          cp build_desktop/Debug/liquid.dll whisper-dsp/prebuilt/desktop/lib/ || cp build_desktop/liquid.dll whisper-dsp/prebuilt/desktop/lib/
          cp whisper-dsp/native/liquid-dsp/include/*.h whisper-dsp/prebuilt/desktop/include/liquid/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liquid-dsp-desktop-${{ matrix.os }}
          path: whisper-dsp/prebuilt/desktop
